
name: Code Quality
permissions:
  checks: write
  pull-requests: write
  contents: read

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run Checkstyle
        run: mvn --batch-mode checkstyle:check
      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest
      - name: Annotate Checkstyle results in PR
        if: github.event_name == 'pull_request'
        run: |
          reviewdog -f=checkstyle -name="checkstyle" -reporter=github-pr-review -level=error -fail-on-error < target/checkstyle-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build with coverage
        run: mvn --batch-mode clean verify
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
      - name: Comment JaCoCo coverage summary in PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
